# macOS用 SSHセキュリティ強化設定テンプレート (custom-security.conf)
# このファイルを /etc/ssh/sshd_config.d/ に配置する際、プレースホルダーを適切な値に書き換えてください。

# 1. SSHポート番号の変更
# ポート番号をデフォルトの22から推測されにくい高位ポートに変更します。
# SSH_PORT を 1024〜65535 の間の任意の数字に置き換えてください。
# 効果: インターネット上の不特定多数による自動スキャン攻撃の対象外になります。
Port SSH_PORT

# 2. パスワード認証の禁止
# パスワードによるログインを完全に禁止し、事前に登録した「公開鍵」のみを許可します。
# 効果: 総当たり攻撃（ブルートフォース）による侵入を100%遮断します。
PasswordAuthentication no

# 3. rootユーザーでのログイン禁止
# システムの最高権限を持つrootアカウントでのログインを禁止します。
# 効果: 万が一認証が突破されても、即座にシステム全体の権限を奪われるリスクを減らします。
PermitRootLogin no

# 4. 空パスワードでのログイン禁止
# パスワードが設定されていないアカウントのログインを拒否します。
# 効果: 誤って作成された脆弱なアカウントからの侵入を防ぎます。
PermitEmptyPasswords no

# 5. 指定ユーザーのみログインを許可
# 明示的に指定したユーザーのみ認証プロセスに進めます。
# SSH_ALLOW_USERNAME をあなたのMacのユーザー名に置き換えてください。
# 効果: 攻撃者が他のユーザー名の推測に成功してもログインを拒絶します。
AllowUsers SSH_ALLOW_USERNAME

# 6. 認証試行回数の制限
# 1回の接続で試行できる回数を3回に制限します。
# 効果: 効率的な総当たり攻撃を物理的に困難にします。
MaxAuthTries 3

# 7. 放置セッションの自動切断
# 300秒（5分）間無通信だった場合、即座に接続を遮断します。
# 効果: 端末の放置による不正利用や、ゾンビ接続によるリソース枯渇を防ぎます。
ClientAliveInterval 300
ClientAliveCountMax 0

# 8. 公開鍵認証の有効化
# 鍵によるログインを正式に許可します。
# 効果: 安全で便利なログインを実現する基盤となります。
PubkeyAuthentication yes

# 9. キーボード対話認証とチャレンジレスポンス認証の禁止
# パスワード認証を模倣した対話形式の認証をすべて無効にします。
# 効果: パスワード入力が必要な「あらゆる裏口」を完全に封鎖します。
KbdInteractiveAuthentication no
ChallengeResponseAuthentication no

# 10. PAM認証の有効化（macOS必須）
# macOSの標準的なユーザー認証基盤（PAM）との連携を維持します。
# 効果: システム標準のセキュリティ機能と矛盾なく動作させます。
UsePAM yes

# 11. X11フォワーディングの禁止
# リモートのGUIアプリを転送する機能をオフにします。
# 効果: GUI転送に付随するキー入力傍受などのセキュリティリスクを排除します。
X11Forwarding no

# 12. ログイン待機時間の短縮
# 接続後、認証を完了させるまでの制限時間を30秒に短縮します。
# 効果: 認証画面で長時間放置されるのを防ぎ、DoS攻撃（サービス不能攻撃）への耐性を高めます。
LoginGraceTime 30s

# 13. 暗号アルゴリズムの近代化（ハードニング）
# セキュリティ強度の高い鍵交換・暗号方式・メッセージ認証のみを許可します。
# 効果: 脆弱性が発見された古い暗号方式による攻撃を未然に防ぎます。
KexAlgorithms curve25519-sha256,curve25519-sha256@libssh.org,diffie-hellman-group-exchange-sha256
Ciphers chacha20-poly1305@openssh.com,aes256-gcm@openssh.com,aes128-gcm@openssh.com
MACs hmac-sha2-512-etm@openssh.com,hmac-sha2-256-etm@openssh.com

# 14. 転送機能の禁止（踏み台化防止）
# Macを経由した他サーバーへの通信（エージェント/TCP転送）を遮断します。
# 効果: Macが侵入された際の被害拡大（横展開）を防止します。
AllowAgentForwarding no
AllowTcpForwarding no

# 15. ログレベルの詳細化
# 接続の試行内容や使用された鍵の詳細をログに記録します。
# 効果: 万が一の不正アクセス調査（フォレンジック）に役立つ詳細な記録を残します。
LogLevel VERBOSE

# 16. パーミッションチェックの厳格化
# .ssh フォルダや鍵ファイルの権限が正しくない（＝他人が読み書きできる）場合に接続を拒否します。
# 効果: 設定の不備によるセキュリティホールを確実に防ぎます。
StrictModes yes

# 17. IPv4 のみを使用（IPv6 の脆弱性やログエラーを回避）
# SSHサーバーが IPv4 通信のみを受け付けるように制限します。
# 効果: 未対策の IPv6 ファイアウォールを突いた攻撃や、不要な IPv6 関連ログエラーを完全に排除します。
AddressFamily inet
